<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página não encontrada</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:linear-gradient(170deg,#0d2f5e,#0a1f3f);
            color:#fff;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow:hidden;
        }
        .container{text-align:center;max-width:500px;}
        .printer{
            font-size:6rem;
            animation:shake 0.4s ease-in-out infinite alternate;
            display:inline-block;
            position:relative;
        }
        @keyframes shake{
            0%{transform:translateX(-6px) rotate(-2deg);}
            100%{transform:translateX(6px) rotate(2deg);}
        }
        .paper{
            font-size:2.8rem;
            position:absolute;
            top:40px;
            left:50%;
            margin-left:-20px;
            animation:jam 1.2s ease-in-out infinite;
            opacity:0.8;
        }
        @keyframes jam{
            0%{transform:translateY(0) rotate(0deg);opacity:1;}
            25%{transform:translateY(-18px) rotate(15deg);opacity:0.9;}
            50%{transform:translateY(0) rotate(-10deg);opacity:1;}
            75%{transform:translateY(-12px) rotate(8deg);opacity:0.9;}
            100%{transform:translateY(0) rotate(0deg);opacity:1;}
        }
        .dots{
            font-size:2rem;
            margin:10px 0;
            letter-spacing:8px;
            animation:blink 0.8s step-end infinite;
        }
        @keyframes blink{50%{opacity:0;}}
        h1{font-size:5rem;font-weight:800;margin:10px 0;background:linear-gradient(90deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .sub{font-size:1.1rem;color:#94a3b8;margin-bottom:6px;}
        .desc{font-size:0.88rem;color:#64748b;margin-bottom:30px;line-height:1.6;}
        .btn-home{
            display:inline-block;
            background:#3b82f6;
            color:#fff;
            padding:12px 32px;
            border-radius:25px;
            font-weight:700;
            font-size:0.95rem;
            text-decoration:none;
            transition:all 0.3s;
            box-shadow:0 4px 14px rgba(59,130,246,0.4);
        }
        .btn-home:hover{background:#2563eb;transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,130,246,0.6);}
        .smoke{
            margin-top:28px;
            font-size:0.75rem;
            color:#475569;
            animation:fade 2s ease-in-out infinite;
        }
        @keyframes fade{0%,100%{opacity:0.3;}50%{opacity:1;}}
        .particles{position:fixed;inset:0;pointer-events:none;}
        .particle{
            position:absolute;
            width:6px;height:6px;
            background:rgba(96,165,250,0.3);
            border-radius:50%;
            animation:float linear infinite;
        }
        @keyframes float{
            0%{transform:translateY(100vh) scale(0);opacity:0;}
            20%{opacity:1;}
            80%{opacity:1;}
            100%{transform:translateY(-10vh) scale(1);opacity:0;}
        }
        .repair-link{
            display:inline-block;
            margin-top:14px;
            color:#60a5fa;
            font-size:0.82rem;
            cursor:pointer;
            text-decoration:underline;
            background:none;
            border:none;
            font-family:inherit;
        }
        .repair-link:hover{color:#93bbfd;}
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="printer">
            🖨️
            <div class="paper">📄</div>
        </div>
        <div class="dots">⚠️ ⚠️ ⚠️</div>
        <h1>404</h1>
        <p class="sub">Página não encontrada</p>
        <p class="desc">Parece que o papel <strong>entalou</strong>!<br>A página que você procura não está aqui.<br>Que tal voltar ao início e tentar de novo?</p>
        <a href="index.html" class="btn-home">&#127968; Voltar ao Início</a>
        <br>
        <button class="repair-link" onclick="document.querySelector('.printer').style.animation='none';setTimeout(function(){document.querySelector('.printer').style.animation=''},100);this.textContent='🔧 Desentalando...';setTimeout(function(){document.querySelector('.printer .paper').style.display='none';document.querySelector('.printer').textContent='🖨️✅';document.querySelector('.dots').textContent='✅ Recuperado!';document.querySelector('.printer .paper').remove();document.querySelector('.repair-link').textContent='✔️ Impressora recuperada!';},1500);">🔧 Desentalar impressora</button>
        <p class="smoke">Se o problema persistir, chame o suporte técnico.</p>
    </div>

    <script>
        (function(){
            var container=document.getElementById('particles');
            for(var i=0;i<30;i++){
                var p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.width=p.style.height=(2+Math.random()*6)+'px';
                p.style.animationDuration=(8+Math.random()*12)+'s';
                p.style.animationDelay=(Math.random()*10)+'s';
                container.appendChild(p);
            }
        })();
    </script>
</body>
</html>
